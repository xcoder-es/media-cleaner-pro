[package]
name = "mc-core"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
tokio-stream = "0.1"
utoipa = { version = "5", features = ["chrono"], optional = true }

[dev-dependencies]
serde_json = "1.0"

[features]
schema = ["dep:utoipa"]
