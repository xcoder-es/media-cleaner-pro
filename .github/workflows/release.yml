name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            ext: .exe
            asset_name: mediacleaner-pro-windows-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            ext: ""
            asset_name: mediacleaner-pro-macos-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            ext: ""
            asset_name: mediacleaner-pro-macos-x86_64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
            asset_name: mediacleaner-pro-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/mediacleaner-pro${{ matrix.ext }}" \
             "${{ matrix.asset_name }}${{ matrix.ext }}"

      - name: Submit to SignPath.io (Windows only)
        if: matrix.os == 'windows-2022'
        uses: signpath/github-sign-action@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: media-cleaner-pro
          signing-policy-slug: release-signing
          input-artifact: ${{ matrix.asset_name }}${{ matrix.ext }}
          output-artifact: ${{ matrix.asset_name }}-signed${{ matrix.ext }}

      - name: Rename signed artifact (Windows only)
        if: matrix.os == 'windows-2022'
        shell: bash
        run: |
          mv "${{ matrix.asset_name }}-signed${{ matrix.ext }}" \
             "${{ matrix.asset_name }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}${{ matrix.ext }}

  create-release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: ls -laR

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MediaCleaner Pro ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            mediacleaner-pro-windows-x86_64/mediacleaner-pro-windows-x86_64.exe
            mediacleaner-pro-macos-aarch64/mediacleaner-pro-macos-aarch64
            mediacleaner-pro-macos-x86_64/mediacleaner-pro-macos-x86_64
            mediacleaner-pro-linux-x86_64/mediacleaner-pro-linux-x86_64
